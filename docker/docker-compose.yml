---
services:
  weaviate:
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8081'
      - --scheme
      - http
    image: semitechnologies/weaviate:1.32.7-cdd4351 #cr.weaviate.io/semitechnologies/weaviate:1.32.6
    ports:
      - 8081:8081
      - 50051:50051
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: on-failure:0
    environment:
      #CLIP_INFERENCE_API: 'http://multi2vec-clip:8080'
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      ENABLE_MODULES: 'text2vec-transformers,reranker-transformers'  # Add this back
      DEFAULT_VECTORIZER_MODULE: none
      TRANSFORMERS_INFERENCE_API:  'http://192.168.1.9:5000'    #'http://172.20.64.1:5000'     #'http://transformers-inference:8080' #'  # Point to your Flask app
      RERANKER_INFERENCE_API:  'http://192.168.1.9:5000'  #'http://172.20.64.1:5000'        #'http://reranker-inference:8080' #'http://172.20.66.152 :5000'     # Point to your Flask rerank endpoint
       #TRANSFORMERS_INFERENCE_API: 'http://transformers-inference:8080'
      #RERANKER_INFERENCE_API: 'http://reranker-inference:8080'
      ENABLE_API_BASED_MODULES: 'true'
      CLUSTER_HOSTNAME: 'node1'

  # Embedding model
  # transformers-inference:
  #   image: semitechnologies/transformers-inference:sentence-transformers-all-MiniLM-L6-v2
  #   environment:
  #     ENABLE_CUDA: '0'
  #   ports:
  #     - 5000:8080  # solo se vuoi testare dall'host
  #   networks:
  #     - weaviate-net

  # Reranking model
  # reranker-inference:
  #   image: semitechnologies/reranker-transformers:cross-encoder-ms-marco-MiniLM-L-6-v2
  #   environment:
  #     ENABLE_CUDA: '0'
  #   ports:
  #     - 5001:8080  # solo se vuoi testare dall'host
  #   networks:
  #     - weaviate-net


volumes:
  weaviate_data:
...
